<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wisata Indonesia</title>
<link rel="stylesheet" href="soalC.css">
</head>

<body>

<!-- Navbar -->
<nav>
    <h2>TravelID</h2>
    <ul>
        <li>Home</li>
        <li>Wisata</li>
        <li>Kontak</li>
    </ul>
</nav>

<!-- Hero -->
<section class="hero">
    <img src="https://picsum.photos/1200/500" alt="wisata">
</section>

<!-- Deskripsi -->
<section class="deskripsi">
    <h2>Wajib Jelajahi Keindahan Pesona Indonesia</h2>
    <p>
        Indonesia memiliki banyak destinasi wisata yang indah dari pantai,
        gunung, hingga budaya yang sangat kaya.
    </p>
</section>

<!-- Card Wisata -->
<section class="card-container">

<div class="card">
<img src="https://picsum.photos/200/150">
<p>Pantai Indah</p>
</div>

<div class="card">
<img src="https://picsum.photos/200/150">
<p>Wisata Alam</p>
</div>

<div class="card">
<img src="https://picsum.photos/200/150">
<p>Pegunungan</p>
</div>

<div class="card">
<img src="https://picsum.photos/200/150">
<p>Danau</p>
</div>

</section>

<!-- Video + Form -->
<section class="content">

<div class="video">
<iframe width="100%" height="250"
src="https://www.youtube.com/embed/watch?v=rYqLV_9LimY">
</iframe>
</div>

<div class="form">
<input type="text" placeholder="Nama">
<input type="email" placeholder="Email">
<textarea placeholder="Pesan"></textarea>
<button>Kirim</button>
</div>

</section>

</body>
</html>
